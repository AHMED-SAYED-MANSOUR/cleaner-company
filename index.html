// ---------- 3D testimonial stack interaction ----------
(function(){
  const stage = document.getElementById('t3dStage'); if(!stage) return;
  const cards = Array.from(stage.querySelectorAll('.t3d-card'));
  const counter = document.getElementById('t3dCounter');
  const progress = stage.parentElement.querySelector('.t3d-progress');
  let active = 0;
  function arrange() {
    cards.forEach((c, i) => {
      const offset = (i - active + cards.length) % cards.length;
      c.classList.remove('pos-0','pos-1','pos-2','pos-3','pos-4','hidden');
      if (offset === 0) c.classList.add('pos-0');
      else if (offset === 1) c.classList.add('pos-1');
      else if (offset === 2) c.classList.add('pos-2');
      else if (offset === cards.length - 1) c.classList.add('pos-3');
      else if (offset === cards.length - 2) c.classList.add('pos-4');
      else c.classList.add('hidden');
    });
    const pad = (n) => (window.FC.lang==='ar' ? String(n).split('').map(d=>'٠١٢٣٤٥٦٧٨٩'[+d]||d).join('') : String(n)).padStart(2,'0');
    if (counter) counter.textContent = pad(active+1) + ' / ' + pad(cards.length);
    if (progress) progress.style.setProperty('--pp', ((active+1)/cards.length*100)+'%');
  }
  arrange();
  document.getElementById('t3dPrev').addEventListener('click', ()=>{ active=(active-1+cards.length)%cards.length; arrange(); });
  document.getElementById('t3dNext').addEventListener('click', ()=>{ active=(active+1)%cards.length; arrange(); });
  // Drag
  let dx=0, dragging=false, sx=0;
  cards.forEach(c => {
    c.addEventListener('mousedown', e=>{ if(!c.classList.contains('pos-0')) return; dragging=true; sx=e.clientX; });
    c.addEventListener('touchstart', e=>{ if(!c.classList.contains('pos-0')) return; dragging=true; sx=e.touches[0].clientX; }, {passive:true});
  });
  window.addEventListener('mousemove', e=>{ if(!dragging) return; dx = e.clientX-sx; });
  window.addEventListener('touchmove', e=>{ if(!dragging) return; dx = e.touches[0].clientX-sx; }, {passive:true});
  function endDrag(){
    if (!dragging) return;
    dragging=false;
    const rtl = document.documentElement.dir==='rtl';
    if (Math.abs(dx) > 60) {
      const dir = (dx>0 ? -1 : 1) * (rtl?-1:1);
      active = (active + dir + cards.length) % cards.length;
      arrange();
    }
    dx=0;
  }
  window.addEventListener('mouseup', endDrag);
  window.addEventListener('touchend', endDrag);
  // Auto-rotate every 6s
  setInterval(()=>{ if(!dragging) { active=(active+1)%cards.length; arrange(); } }, 6500);
})();

      const crest = document.getElementById('pSpotCrest');

      const ch = document.getElementById('pSpotChips'); if (ch) ch.innerHTML = c.services.map(s=>`<span>${s}</span>`).join('');
      const yr = document.getElementById('pSpotYears'); if (yr) yr.textContent = ((new Date()).getFullYear() - parseInt(c.since,10)) + '+ ' + (ar?'سنة':'yrs');

// ---------- Hero video showcase ----------
(function(){
  const stage = document.getElementById('heroShowcase');
  if (!stage) return;
  const videos = stage.querySelectorAll('.hs-video');
  const dots = stage.querySelectorAll('.hs-dot');
  const titleEl = document.getElementById('hsTitle');
  const subEl = document.getElementById('hsSubtitle');
  const countEl = document.getElementById('hsCount');
  const muteBtn = document.getElementById('hsMute');
  const muteIcon = document.getElementById('hsMuteIcon');
  const ar = window.FC.lang === 'ar';
  const captions = ar ? [
    {t: 'تنظيف عميق · موقع تجاري', s: 'فريق كلينير · القاهرة'},
    {t: 'تعقيم وتطهير · مساحة مكتبية', s: 'فريق كلينير · القاهرة'},
    {t: 'تنظيف شامل · بعد التشطيب', s: 'فريق كلينير · القاهرة'},
    {t: 'تنظيف واجهات زجاجية · ارتفاعات', s: 'فريق كلينير · القاهرة'},
    {t: 'تلميع رخام · خدمة فاخرة', s: 'فريق كلينير · القاهرة'},
    {t: 'فرش وأنتريهات · غسيل بالبخار', s: 'فريق كلينير · القاهرة'},
  ] : [
    {t: 'Deep clean · Commercial site', s: 'Cleaner crew · Cairo'},
    {t: 'Disinfection · Office space', s: 'Cleaner crew · Cairo'},
    {t: 'Post-construction clean', s: 'Cleaner crew · Cairo'},
    {t: 'Glass facade · High-rise rope access', s: 'Cleaner crew · Cairo'},
    {t: 'Marble polishing · Premium service', s: 'Cleaner crew · Cairo'},
    {t: 'Upholstery · Steam wash', s: 'Cleaner crew · Cairo'},
  ];
  let idx = 0;
  const arDigits = (n) => ar ? String(n).replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[+d]) : String(n);
  const swap = (next) => {
    if (next === idx) return;
    videos.forEach(v => v.classList.remove('active'));
    dots.forEach(d => d.classList.remove('active'));
    videos[next].classList.add('active');
    videos[next].currentTime = 0;
    videos[next].play().catch(()=>{});
    dots[next].classList.add('active');
    titleEl.textContent = captions[next].t;
    subEl.textContent = captions[next].s;
    countEl.textContent = arDigits(next+1) + ' / ' + arDigits(videos.length);
    idx = next;
  };
  // Autoplay first
  videos[0].play().catch(()=>{});
  dots.forEach(d => d.addEventListener('click', () => { swap(+d.dataset.i); resetTimer(); }));
  let timer = null;
  const resetTimer = () => { clearInterval(timer); timer = setInterval(() => swap((idx+1)%videos.length), 6000); };
  resetTimer();
  // Mute toggle
  let muted = true;
  const muteSvg = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  const soundSvg = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    videos.forEach(v => v.muted = muted);
    muteIcon.innerHTML = muted ? muteSvg : soundSvg;
  });
})();
