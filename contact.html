<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا — Cleaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/3d.css">
  <link rel="stylesheet" href="assets/sections.css">
<link rel="stylesheet" href="assets/home.css">
<link rel="stylesheet" href="assets/animations.css">
<link rel="stylesheet" href="assets/mobile-fixes.css">
<style>
  .contact-shell {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 56px;
    align-items: start;
  }
  @media (max-width: 980px) { .contact-shell { grid-template-columns: 1fr; gap: 32px; } }
  .form-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 36px;
    box-shadow: var(--shadow);
  }
  @media (max-width: 540px) { .form-card { padding: 24px; } }
  .stepper {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 28px;
  }
  .stepper-pill {
    flex: 1;
    height: 6px;
    background: var(--bg-soft);
    border-radius: 6px;
    overflow: hidden;
  }
  .stepper-pill.done span, .stepper-pill.active span {
    display: block;
    height: 100%;
    background: var(--accent);
    width: 100%;
    transform-origin: left;
    animation: fillPill .4s ease forwards;
  }
  html[dir="rtl"] .stepper-pill span { transform-origin: right; }
  @keyframes fillPill { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .step-meta {
    display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px;
    font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); letter-spacing: 0.08em;
  }
  html[lang="ar"] .step-meta { font-family: var(--font-ar); letter-spacing: 0; }
  .step-title { font-size: 22px; font-weight: 700; margin-bottom: 24px; }
  .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
  .field label { font-size: 13px; font-weight: 600; color: var(--ink-2); }
  .field input, .field select, .field textarea {
    padding: 14px 16px;
    border: 1px solid var(--line-2);
    border-radius: var(--radius);
    background: #fff;
    font-family: inherit;
    font-size: 15px;
    color: var(--ink);
    transition: border-color .15s, box-shadow .15s;
  }
  .field textarea { resize: vertical; min-height: 90px; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(16,185,129,.12);
  }
  .field-error { color: #dc2626; font-size: 12px; }
  .field.error input, .field.error select, .field.error textarea { border-color: #dc2626; }
  .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 540px) { .row-2 { grid-template-columns: 1fr; } }
  .cat-tiles {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
  }
  @media (max-width: 540px) { .cat-tiles { grid-template-columns: 1fr; } }
  .cat-tile {
    border: 1.5px solid var(--line-2);
    border-radius: var(--radius);
    padding: 16px;
    background: #fff;
    cursor: pointer;
    text-align: start;
    transition: all .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .cat-tile:hover { border-color: var(--ink); }
  .cat-tile.active { border-color: var(--accent); background: #f0fdf4; box-shadow: 0 0 0 4px rgba(16,185,129,.08); }
  .cat-tile .ico {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent-ink);
    display: grid; place-items: center; margin-bottom: 8px;
  }
  .cat-tile .name { font-weight: 600; font-size: 15px; }
  .cat-tile .meta { font-size: 12px; color: var(--ink-3); }
  .form-actions {
    display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 12px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }
  .info-card {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 28px;
    margin-bottom: 16px;
  }
  .info-card h3 { font-size: 18px; margin-bottom: 18px; }
  .info-card .row {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .info-card .row:last-child { border-bottom: none; padding-bottom: 0; }
  .info-card .row:first-child { padding-top: 0; }
  .info-card .ico {
    width: 40px; height: 40px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent-ink);
    display: grid; place-items: center; flex-shrink: 0;
  }
  .info-card .label { font-size: 12px; color: var(--ink-3); margin-bottom: 2px; }
  .info-card .value { font-weight: 600; font-size: 15px; color: var(--ink); }
  .info-card .value a { color: var(--ink); }
  .info-card .value a:hover { color: var(--accent-2); }
  .map-card {
    border-radius: var(--radius-lg);
    overflow: hidden;
    aspect-ratio: 16/10;
    background: var(--bg-soft);
    position: relative;
  }
  .map-bg {
    position: absolute; inset: 0;
    background:
      linear-gradient(135deg, rgba(16,185,129,.05), rgba(16,185,129,0)),
      repeating-linear-gradient(0deg, transparent 0 39px, rgba(11,20,16,.06) 39px 40px),
      repeating-linear-gradient(90deg, transparent 0 39px, rgba(11,20,16,.06) 39px 40px);
  }
  .map-pin {
    position: absolute; inset: 0; display: grid; place-items: center;
  }
  .map-pin .pin {
    width: 36px; height: 36px; border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    background: var(--accent);
    box-shadow: 0 12px 30px -10px rgba(16,185,129,.6);
    position: relative;
  }
  .map-pin .pin::after {
    content: ""; width: 12px; height: 12px;
    background: #fff; border-radius: 50%;
    position: absolute; inset: 12px;
  }
  .map-pin .pulse {
    position: absolute; width: 100px; height: 100px;
    border-radius: 50%; background: rgba(16,185,129,.15);
    animation: pulse 2.4s infinite;
  }
  @keyframes pulse { 0% { transform: scale(.6); opacity: .8; } 100% { transform: scale(1.6); opacity: 0; } }
  .success {
    text-align: center; padding: 40px 24px;
  }
  .success .check {
    width: 64px; height: 64px; border-radius: 50%;
    background: var(--accent); color: #fff;
    display: grid; place-items: center; margin: 0 auto 24px;
    box-shadow: 0 12px 30px -10px rgba(16,185,129,.6);
  }
  .success h3 { font-size: 24px; margin-bottom: 10px; }
  .success p { color: var(--ink-3); margin-bottom: 24px; }
</style>
</head>
<body>
<script src="assets/i18n.js"></script>
<script src="assets/components.js"></script>
<script src="assets/animations.js"></script>
<main id="main"></main>
<script>
window.FC.applyLang();
const t = window.FC.t.bind(window.FC);
const lang = window.FC.lang;
const ar = lang === "ar";
const main = document.getElementById("main");
const services = window.FC.services;

const catKeys = ["homes", "companies", "special"];

main.innerHTML = `
  <section class="container page-intro">
    <div data-anim="up" style="max-width:680px">
      <span class="eyebrow">${t("contact.eyebrow")}</span>
      <h1 style="margin-top:14px">${t("contact.title")}</h1>
      <p class="lead" style="margin-top:18px">${t("contact.sub")}</p>
    </div>
  </section>
  <section class="container" style="padding-bottom:96px">
    <div class="contact-shell">
      <div class="form-card" data-anim="up">
        <div class="stepper" id="stepper">
          ${[0,1,2].map(i => `<div class="stepper-pill ${i === 0 ? "active" : ""}"><span></span></div>`).join("")}
        </div>
        <div class="step-meta">
          <span id="stepLabel">${t("contact.stepLabels")[0]}</span>
          <span><span id="stepNum">${ar ? "١" : "1"}</span> / ${ar ? "٣" : "3"}</span>
        </div>
        <form id="bookingForm" novalidate>
          <!-- step 1 -->
          <div class="step" data-step="0">
            <div class="step-title">${t("contact.f.category")}</div>
            <div class="cat-tiles" id="catTiles">
              ${catKeys.map(k => `
                <button type="button" class="cat-tile" data-cat="${k}">
                  <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${
                    k === "homes" ? `<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>` :
                    k === "companies" ? `<rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 9h6M9 13h6M9 17h6"/>` :
                    `<circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/>`
                  }</svg></div>
                  <div class="name">${t(`services.tabs.${k}`)}</div>
                  <div class="meta">${services[k].length} ${ar ? "خدمة" : "services"}</div>
                </button>
              `).join("")}
            </div>
            <div class="field" style="margin-top:24px;">
              <label>${t("contact.f.service")}</label>
              <select name="service" id="serviceSelect" disabled>
                <option value="">${ar ? "اختر فئة أولاً" : "Pick a category first"}</option>
              </select>
            </div>
          </div>

          <!-- step 2 -->
          <div class="step" data-step="1" style="display:none">
            <div class="step-title">${ar ? "تفاصيل الموقع" : "Place details"}</div>
            <div class="row-2">
              <div class="field">
                <label>${t("contact.f.size")}</label>
                <input type="number" name="size" placeholder="120">
              </div>
              <div class="field">
                <label>${t("contact.f.location")}</label>
                <input type="text" name="location" placeholder="${ar ? "مدينة نصر، القاهرة" : "Nasr City, Cairo"}">
              </div>
            </div>
            <div class="row-2">
              <div class="field">
                <label>${t("contact.f.date")}</label>
                <input type="date" name="date">
              </div>
              <div class="field">
                <label>${t("contact.f.time")}</label>
                <select name="time">
                  <option value="">—</option>
                  <option>${ar ? "صباحًا (٩-١٢)" : "Morning (9-12)"}</option>
                  <option>${ar ? "ظهرًا (١٢-٤)" : "Noon (12-4)"}</option>
                  <option>${ar ? "مساءً (٤-٨)" : "Evening (4-8)"}</option>
                  <option>${ar ? "ليلاً (٨-١٢)" : "Night (8-12)"}</option>
                </select>
              </div>
            </div>
            <div class="field">
              <label>${t("contact.f.notes")}</label>
              <textarea name="notes" placeholder="${t('contact.f.notesPh')}"></textarea>
            </div>
          </div>

          <!-- step 3 -->
          <div class="step" data-step="2" style="display:none">
            <div class="step-title">${ar ? "بياناتك" : "Your information"}</div>
            <div class="field">
              <label>${t("contact.f.name")}</label>
              <input type="text" name="name" required>
              <span class="field-error"></span>
            </div>
            <div class="row-2">
              <div class="field">
                <label>${t("contact.f.phone")}</label>
                <input type="tel" name="phone" required>
                <span class="field-error"></span>
              </div>
              <div class="field">
                <label>${t("contact.f.email")}</label>
                <input type="email" name="email">
              </div>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-ghost" id="btnBack" style="visibility:hidden">${t("contact.back")}</button>
            <button type="button" class="btn btn-primary" id="btnNext">${t("contact.next")} <span class="arrow">→</span></button>
          </div>
        </form>

        <div class="success" id="success" style="display:none">
          <div class="check"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
          <h3>${ar ? "تم استلام طلبك" : "Request received"}</h3>
          <p>${t("contact.success")}</p>
          <a href="index.html" class="btn btn-primary">${ar ? "العودة للرئيسية" : "Back to home"}</a>
        </div>
      </div>

      <aside>
        <div class="info-card" data-anim="up">
          <h3>${ar ? "تواصل مباشر" : "Reach us directly"}</h3>
          <div class="row">
            <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.69 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.56 2.81.69A2 2 0 0 1 22 16.92z"/></svg></div>
            <div><div class="label">${t("contact.info.phoneT")}</div><div class="value"><a href="tel:+201119383646" dir="ltr" style="unicode-bidi:bidi-override;">+20 111 938 3646</a></div></div>
          </div>
          <div class="row">
            <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l4.9-1.4A10 10 0 1 0 12 2z"/></svg></div>
            <div><div class="label">${t("contact.info.whatsappT")}</div><div class="value"><a href="https://wa.me/201119383646" dir="ltr" style="unicode-bidi:bidi-override;">+20 111 938 3646</a></div></div>
          </div>
          <div class="row">
            <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></div>
            <div><div class="label">${t("contact.info.emailT")}</div><div class="value"><a href="mailto:info@future-clean-service.com">info@future-clean-service.com</a></div></div>
          </div>
          <div class="row">
            <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div><div class="label">${t("contact.info.addressT")}</div><div class="value">${t("contact.info.address")}</div></div>
          </div>
          <div class="row">
            <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div><div class="label">${t("contact.info.hoursT")}</div><div class="value" style="font-weight:500">${t("contact.info.hours")}</div></div>
          </div>
        </div>
        <div class="map-card" data-anim="up">
          <div class="map-bg"></div>
          <div class="map-pin"><div class="pulse"></div><div class="pin"></div></div>
        </div>
      </aside>
    </div>
  </section>
`;

window.FC.mountChrome("contact");
window.FC.observeReveal();
window.FC.boot();

/* multi-step form */
let step = 0;
let selectedCat = null;
const totalSteps = 3;
const arDigits = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
const fmtNum = (n) => ar ? String(n).replace(/\d/g, d => arDigits[d]) : String(n);

const stepperPills = document.querySelectorAll(".stepper-pill");
const stepLabel = document.getElementById("stepLabel");
const stepNum = document.getElementById("stepNum");
const btnBack = document.getElementById("btnBack");
const btnNext = document.getElementById("btnNext");
const stepEls = document.querySelectorAll(".step");
const labels = t("contact.stepLabels");

const showStep = (i) => {
  stepEls.forEach(el => el.style.display = parseInt(el.dataset.step,10) === i ? "block" : "none");
  stepperPills.forEach((p, idx) => {
    p.classList.toggle("done", idx < i);
    p.classList.toggle("active", idx === i);
  });
  stepLabel.textContent = labels[i];
  stepNum.textContent = fmtNum(i + 1);
  btnBack.style.visibility = i === 0 ? "hidden" : "visible";
  btnNext.innerHTML = i === totalSteps - 1
    ? `${t("contact.submit")} <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>`
    : `${t("contact.next")} <span class="arrow">→</span>`;
};

document.querySelectorAll(".cat-tile").forEach(tile => {
  tile.addEventListener("click", () => {
    document.querySelectorAll(".cat-tile").forEach(x => x.classList.remove("active"));
    tile.classList.add("active");
    selectedCat = tile.dataset.cat;
    const sel = document.getElementById("serviceSelect");
    sel.disabled = false;
    sel.innerHTML = `<option value="">${ar ? "اختر خدمة" : "Choose a service"}</option>` +
      services[selectedCat].map(s => `<option value="${s.id}">${ar ? s.ar : s.en}</option>`).join("");
  });
});

const validateStep = (i) => {
  let ok = true;
  if (i === 0) {
    if (!selectedCat) { ok = false; alert(ar ? "اختر فئة الخدمة أولاً" : "Pick a service category first"); }
  }
  if (i === 2) {
    document.querySelectorAll(".step[data-step='2'] .field").forEach(f => f.classList.remove("error"));
    const form = document.getElementById("bookingForm");
    const name = form.name.value.trim();
    const phone = form.phone.value.trim();
    if (!name) { ok = false; form.name.closest(".field").classList.add("error"); form.name.closest(".field").querySelector(".field-error").textContent = ar ? "هذا الحقل مطلوب" : "Required"; }
    if (!phone) { ok = false; form.phone.closest(".field").classList.add("error"); form.phone.closest(".field").querySelector(".field-error").textContent = ar ? "هذا الحقل مطلوب" : "Required"; }
  }
  return ok;
};

btnNext.addEventListener("click", () => {
  if (!validateStep(step)) return;
  if (step < totalSteps - 1) { step++; showStep(step); }
  else {
    document.getElementById("bookingForm").style.display = "none";
    document.querySelector(".form-actions").style.display = "none";
    document.querySelector(".stepper").style.display = "none";
    document.querySelector(".step-meta").style.display = "none";
    document.getElementById("success").style.display = "block";
  }
});
btnBack.addEventListener("click", () => { if (step > 0) { step--; showStep(step); } });
showStep(0);
</script>
</body>
</html>
