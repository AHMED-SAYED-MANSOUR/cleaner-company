<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خدماتنا — Future Clean</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/3d.css">
  <link rel="stylesheet" href="assets/sections.css">
<link rel="stylesheet" href="assets/home.css">
<link rel="stylesheet" href="assets/animations.css">
<link rel="stylesheet" href="assets/mobile-fixes.css">
<style>
  .svc-row {
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 56px;
    align-items: center;
    padding: 56px 0;
    border-top: 1px solid var(--line);
  }
  .svc-row:first-of-type { border-top: none; }
  .svc-row.flip { grid-template-columns: 1.1fr 1fr; }
  .svc-row.flip .svc-copy { order: 2; }
  @media (max-width: 980px) {
    .svc-row, .svc-row.flip { grid-template-columns: 1fr; }
    .svc-row.flip .svc-copy { order: 0; }
  }
  .svc-copy h2 { margin: 14px 0 16px; font-size: clamp(28px, 3.4vw, 38px); }
  .svc-copy ul { list-style: none; padding: 0; margin: 16px 0 0; display: grid; gap: 10px; }
  .svc-copy li { display: flex; gap: 10px; align-items: flex-start; color: var(--ink-2); font-size: 15px; }
  .svc-copy li svg { flex-shrink: 0; color: var(--accent); margin-top: 4px; }
  .svc-copy .actions { display: flex; gap: 12px; margin-top: 28px; flex-wrap: wrap; }
  .svc-gallery {
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 8px;
    aspect-ratio: 4/3;
  }
  .svc-gallery > * {
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--bg-soft);
    cursor: pointer;
    position: relative;
  }
  .svc-gallery img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
  .svc-gallery > *:hover img { transform: scale(1.05); }
  .svc-gallery .main { grid-row: 1 / 3; }
  .svc-gallery .more {
    display: grid; place-items: center;
    background: var(--ink); color: #fff;
    font-weight: 600; font-size: 14px;
  }
  .svc-cat-header {
    background: linear-gradient(135deg, var(--accent-soft), #f0fdf4);
    padding: 56px 48px;
    border-radius: var(--radius-lg);
    margin: 64px 0 24px;
    display: flex; justify-content: space-between; align-items: end;
    gap: 32px;
    flex-wrap: wrap;
  }
  .svc-cat-header:first-of-type { margin-top: 24px; }
  .svc-cat-header h2 { font-size: clamp(28px, 3.6vw, 42px); }
  .svc-cat-header .meta { color: var(--ink-3); font-size: 14px; }

  /* lightbox */
  .lightbox {
    position: fixed; inset: 0;
    background: rgba(11,20,16,.92);
    display: none;
    place-items: center;
    z-index: 100;
    padding: 24px;
  }
  .lightbox.open { display: grid; }
  .lightbox-img {
    max-width: min(90vw, 1100px);
    max-height: 88vh;
    border-radius: var(--radius);
    box-shadow: var(--shadow-lg);
  }
  .lightbox-close, .lb-nav {
    position: absolute;
    background: rgba(255,255,255,.1);
    color: #fff;
    width: 48px; height: 48px;
    border-radius: 50%;
    display: grid; place-items: center;
    transition: background .2s;
  }
  .lightbox-close { top: 24px; right: 24px; }
  .lb-prev { inset-inline-start: 24px; top: 50%; transform: translateY(-50%); }
  .lb-next { inset-inline-end: 24px; top: 50%; transform: translateY(-50%); }
  html[dir="rtl"] .lb-prev svg, html[dir="rtl"] .lb-next svg { transform: scaleX(-1); }
  .lightbox-close:hover, .lb-nav:hover { background: rgba(255,255,255,.2); }
  .lb-counter {
    position: absolute;
    bottom: 24px; left: 50%; transform: translateX(-50%);
    color: #fff; font-family: var(--font-mono); font-size: 13px;
    background: rgba(255,255,255,.1);
    padding: 8px 16px; border-radius: var(--radius-pill);
  }
</style>
</head>
<body>
<script src="assets/i18n.js"></script>
<script src="assets/components.js"></script>
<script src="assets/animations.js"></script>
<main id="main"></main>
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" aria-label="close"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
  <button class="lb-nav lb-prev" aria-label="prev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
  <button class="lb-nav lb-next" aria-label="next"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
  <img class="lightbox-img" alt="">
  <div class="lb-counter"></div>
</div>
<script>
window.FC.applyLang();
const t = window.FC.t.bind(window.FC);
const lang = window.FC.lang;
const ar = lang === "ar";
const main = document.getElementById("main");
const services = window.FC.services;
const cats = [
  { key: "homes", count: 8 },
  { key: "companies", count: 8 },
  { key: "special", count: 8 },
];

const renderRow = (catKey, s, i) => {
  const folder = `services/${catKey}/${s.cdn}`;
  const main = `${folder}/${s.cdn}1.jpg`;
  const t1 = `${folder}/${s.cdn}2.jpg`;
  const t2 = `${folder}/${s.cdn}3.jpg`;
  const allImgs = Array.from({length: 8}, (_, k) => `${folder}/${s.cdn}${k+1}.jpg`);
  const features = ar
    ? ["أدوات حديثة وآمنة", "فريق مدرّب ومنضبط", "ضمان متابعة بعد التنفيذ", "تنفيذ في الوقت المحدد"]
    : ["Modern, safe equipment", "Trained, disciplined crew", "Post-service follow-up", "Executed on schedule"];
  return `
    <article class="svc-row ${i % 2 ? "flip" : ""}" id="${s.id}" data-anim="${i % 2 ? "left" : "right"}">
      <div class="svc-copy">
        <span class="tag dot">${ar ? `${t(`services.tabs.${catKey}`)}` : t(`services.tabs.${catKey}`)}</span>
        <h2>${ar ? s.ar : s.en}</h2>
        <p class="lead">${ar ? s.arDesc : s.enDesc}</p>
        <ul>
          ${features.map(f => `<li><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><polyline points="20 6 9 17 4 12"/></svg>${f}</li>`).join("")}
        </ul>
        <div class="actions">
          <a href="contact.html" class="btn btn-primary">${ar ? "احجز هذه الخدمة" : "Book this service"} <span class="arrow">→</span></a>
          <a href="tel:+201119383646" class="btn btn-ghost">${t("cta.call")}</a>
        </div>
      </div>
      <div class="svc-gallery" data-imgs='${JSON.stringify(allImgs)}'>
        <div class="main" data-i="0"><img src="${window.FC.imgUrl(main)}" alt="" onerror="this.style.display='none'; this.parentElement.classList.add('ph');"></div>
        <div data-i="1"><img src="${window.FC.imgUrl(t1)}" alt="" onerror="this.style.display='none'; this.parentElement.classList.add('ph');"></div>
        <div class="more" data-i="2">+${5} ${ar ? "صور" : "photos"}</div>
      </div>
    </article>
  `;
};

const renderCategory = (catKey) => {
  const items = services[catKey];
  return `
    <section class="container">
      <div class="svc-cat-header" data-anim="up">
        <div>
          <span class="eyebrow">${t(`services.tabs.${catKey}`)}</span>
          <h2 style="margin-top:12px">${ar
            ? (catKey === "homes" ? "نظافة بيتك بأدق التفاصيل" : catKey === "companies" ? "حلول للشركات والمنشآت" : "خدمات متخصصة وآمنة")
            : (catKey === "homes" ? "Home cleaning, in fine detail" : catKey === "companies" ? "Solutions for businesses & facilities" : "Specialized & safe services")
          }</h2>
        </div>
        <div class="meta">${items.length} ${ar ? "خدمة" : "services"} · ${ar ? "متاحة الآن" : "available now"}</div>
      </div>
      ${items.map((s, i) => renderRow(catKey, s, i)).join("")}
    </section>
  `;
};

main.innerHTML = `
  <section class="container page-intro">
    <div data-anim="up">
      <span class="eyebrow">${t("services.eyebrow")}</span>
      <h1 style="margin-top:14px">${t("services.title")}</h1>
      <p class="lead" style="margin-top:18px; max-width:60ch">${t("services.sub")}</p>
    </div>
  </section>
  ${cats.map(c => renderCategory(c.key)).join("")}
  <section class="container section-tight">
    <div class="cta-banner" data-anim="up">
      <div>
        <h2 style="margin-bottom:14px">${t("bookCta.title")}</h2>
        <p>${t("bookCta.sub")}</p>
        <div class="row" style="margin-top:24px">
          <a class="btn btn-accent" href="contact.html">${t("hero.ctaPrimary")} <span class="arrow">→</span></a>
        </div>
      </div>
      <div class="cta-illus">
        <div class="row"><div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="label">${ar ? "+١٧ خدمة" : "17+ services"}</div><div class="sub">${ar ? "للمنازل والشركات" : "homes & businesses"}</div></div></div>
      </div>
    </div>
  </section>
`;

window.FC.mountChrome("services");
window.FC.observeReveal();
window.FC.boot();

/* lightbox */
const lb = document.getElementById("lightbox");
const lbImg = lb.querySelector(".lightbox-img");
const lbCounter = lb.querySelector(".lb-counter");
let curList = [], curIdx = 0;
const renderLB = () => {
  lbImg.src = window.FC.imgUrl(curList[curIdx]);
  lbCounter.textContent = `${curIdx + 1} / ${curList.length}`;
};
const open = (list, i) => {
  curList = list; curIdx = i;
  lb.classList.add("open");
  renderLB();
};
lb.addEventListener("click", (e) => { if (e.target === lb) lb.classList.remove("open"); });
lb.querySelector(".lightbox-close").addEventListener("click", () => lb.classList.remove("open"));
lb.querySelector(".lb-prev").addEventListener("click", (e) => { e.stopPropagation(); curIdx = (curIdx - 1 + curList.length) % curList.length; renderLB(); });
lb.querySelector(".lb-next").addEventListener("click", (e) => { e.stopPropagation(); curIdx = (curIdx + 1) % curList.length; renderLB(); });
document.addEventListener("keydown", (e) => {
  if (!lb.classList.contains("open")) return;
  if (e.key === "Escape") lb.classList.remove("open");
  if (e.key === "ArrowLeft") { curIdx = (curIdx - 1 + curList.length) % curList.length; renderLB(); }
  if (e.key === "ArrowRight") { curIdx = (curIdx + 1) % curList.length; renderLB(); }
});
document.querySelectorAll(".svc-gallery").forEach(g => {
  const list = JSON.parse(g.dataset.imgs);
  g.querySelectorAll("[data-i]").forEach(cell => {
    cell.addEventListener("click", () => open(list, parseInt(cell.dataset.i, 10)));
  });
});
</script>
</body>
</html>
