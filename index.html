/* ----- service tabs ----- */
document.querySelectorAll(".tabs button").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tabs button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    const grid = document.getElementById("serviceGrid");
    grid.style.opacity = "0";
    setTimeout(() => {
      grid.innerHTML = renderServiceCards(btn.dataset.tab);
      grid.style.opacity = "1";
    }, 150);
  });
});

/* ----- testimonials carousel ----- */
const track = document.getElementById("tTrack");
const dotsWrap = document.getElementById("tDots");
const tCount = tItems.length;
const perView = window.innerWidth <= 640 ? 1 : (window.innerWidth <= 980 ? 2 : 3);
const pages = Math.max(1, Math.ceil(tCount / perView));
let cur = 0;
const renderDots = () => {
  dotsWrap.innerHTML = "";
  for (let i = 0; i < pages; i++) {
    const d = document.createElement("button");
    d.className = "t-dot" + (i === cur ? " active" : "");
    d.addEventListener("click", () => goTo(i));
    dotsWrap.appendChild(d);
  }
};
const goTo = (i) => {
  cur = (i + pages) % pages;
  const w = track.clientWidth + 20;
  track.scrollTo({ left: (lang === "ar" ? -1 : 1) * cur * w, behavior: "smooth" });
  renderDots();
};
document.getElementById("tNext").addEventListener("click", () => goTo(cur + 1));
document.getElementById("tPrev").addEventListener("click", () => goTo(cur - 1));
renderDots();
setInterval(() => goTo(cur + 1), 8000);

/* ----- accordion ----- */
document.querySelectorAll("#faq .accordion-trigger").forEach(btn => {
  btn.addEventListener("click", () => {
    const item = btn.parentElement;
    const c = item.querySelector(".accordion-content");
    const open = item.classList.toggle("open");
    if (open) {
      c.style.maxHeight = c.scrollHeight + "px";
    } else {
      c.style.maxHeight = "0";
    }
  });
});

/* ----- transitions ----- */
document.getElementById("serviceGrid").style.transition = "opacity .2s";

window.FC.observeReveal();
window.FC.boot();

/* ----- partners showcase logic ----- */
const pStage = document.getElementById("pStage");
const pNameEl = document.getElementById("pName");
const pSectorEl = document.getElementById("pSector");
const pMetaEl = document.getElementById("pMeta");
const pMarkEl = document.getElementById("pMark");
const pServicesEl = document.getElementById("pServices");
const pYearsEl = document.getElementById("pYears");
const pScopeEl = document.getElementById("pScope");
const pIdxEl = document.getElementById("pIdx");
const pPlayIcon = document.getElementById("pPlayIcon");
const arDigits = ["٠","١","٢","٣","٤","٥","٦","٧","٨","٩"];
const fmtNum = (n) => ar ? String(n).replace(/\d/g, d => arDigits[d]) : String(n);
let pCur = 0, pPlaying = true, pTimer = null;
const pCells = [...document.querySelectorAll(".p-cell")];
const swapPartner = (i) => {
  pCur = (i + partnerCards.length) % partnerCards.length;
  const c = partnerCards[pCur];
  pCells.forEach(x => x.classList.remove("active", "playing"));
  pCells[pCur].classList.add("active");
  // animate stage content out, then in
  const inner = pStage.querySelector(".p-stage-inner");
  inner.style.transition = "opacity .3s, transform .3s";
  inner.style.opacity = "0";
  inner.style.transform = "translateY(10px)";
  setTimeout(() => {
    pStage.style.setProperty("--p-bg", c.color);
    pNameEl.textContent = c.name;
    pSectorEl.textContent = c.sector;
    pMetaEl.textContent = `${pDetail.since} ${c.since}`;
    pMarkEl.textContent = c.name.slice(0, 2);
    pServicesEl.innerHTML = c.services.map(s => `<span class="chip">${s}</span>`).join("");
    pYearsEl.textContent = ((new Date()).getFullYear() - parseInt(c.since, 10)) + "+";
    pScopeEl.textContent = c.scope;
    pIdxEl.textContent = fmtNum(pCur + 1);
    inner.style.opacity = "1";
    inner.style.transform = "translateY(0)";
    if (pPlaying) {
      requestAnimationFrame(() => pCells[pCur].classList.add("playing"));
    }
  }, 280);
};
const startTimer = () => {
  clearInterval(pTimer);
  if (!pPlaying) return;
  pTimer = setInterval(() => swapPartner(pCur + 1), 4500);
};
pCells.forEach(c => c.addEventListener("click", () => { swapPartner(parseInt(c.dataset.i, 10)); startTimer(); }));
document.getElementById("pNext").addEventListener("click", () => { swapPartner(pCur + 1); startTimer(); });
document.getElementById("pPrev").addEventListener("click", () => { swapPartner(pCur - 1); startTimer(); });
document.getElementById("pPlay").addEventListener("click", () => {
  pPlaying = !pPlaying;
  pPlayIcon.innerHTML = pPlaying
    ? `<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>`
    : `<polygon points="6 4 20 12 6 20 6 4"/>`;
  if (pPlaying) { pCells[pCur].classList.add("playing"); startTimer(); }
  else { pCells.forEach(c => c.classList.remove("playing")); clearInterval(pTimer); }
});
startTimer();
</script>
</body>
