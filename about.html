<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عن الشركة — Cleaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Tajawal:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
  <link rel="stylesheet" href="assets/3d.css">
  <link rel="stylesheet" href="assets/sections.css">
<link rel="stylesheet" href="assets/home.css">
<link rel="stylesheet" href="assets/animations.css">
<link rel="stylesheet" href="assets/mobile-fixes.css">
<style>
  .about-hero {
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 56px;
    align-items: center;
    padding: 64px 0 48px;
  }
  @media (max-width: 980px) { .about-hero { grid-template-columns: 1fr; } }
  .about-hero .visual {
    aspect-ratio: 4/5;
    border-radius: var(--radius-lg);
    overflow: hidden;
    background: var(--bg-soft);
    box-shadow: var(--shadow-lg);
  }
  .about-hero .visual img { width: 100%; height: 100%; object-fit: cover; }
  .pillars {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-top: 64px;
  }
  @media (max-width: 820px) { .pillars { grid-template-columns: 1fr; } }
  .pillar { background: var(--bg-elev); padding: 36px 32px; }
  .pillar h3 { font-size: 22px; margin-bottom: 12px; }
  .pillar p { color: var(--ink-3); }
  .pillar .ico {
    width: 48px; height: 48px; border-radius: 14px;
    background: var(--accent-soft); color: var(--accent-ink);
    display: grid; place-items: center;
    margin-bottom: 18px;
  }
  .timeline {
    position: relative;
    margin-top: 32px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    inset-inline-start: 80px;
    top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg, var(--accent), var(--line));
  }
  @media (max-width: 640px) { .timeline::before { inset-inline-start: 36px; } }
  .tl-item {
    position: relative;
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 32px;
    padding: 24px 0 24px 0;
  }
  @media (max-width: 640px) { .tl-item { grid-template-columns: 36px 1fr; gap: 24px; } }
  .tl-year {
    text-align: end;
    font-family: var(--font-mono);
    font-weight: 600;
    color: var(--accent-2);
    padding-top: 6px;
    font-size: 14px;
  }
  html[lang="ar"] .tl-year { font-family: var(--font-ar); }
  .tl-content {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    padding: 24px 28px;
    position: relative;
  }
  .tl-content::before {
    content: "";
    position: absolute;
    inset-inline-start: -36px;
    top: 28px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 4px var(--bg);
  }
  html[dir="rtl"] .tl-content::before { inset-inline-start: auto; inset-inline-end: -36px; }
  .tl-content h3 { font-size: 20px; margin-bottom: 8px; }
  .tl-content p { color: var(--ink-3); }
</style>
</head>
<body>
<script src="assets/i18n.js"></script>
<script src="assets/components.js"></script>
<script src="assets/animations.js"></script>
<main id="main"></main>
<script>
window.FC.applyLang();
const t = window.FC.t.bind(window.FC);
const lang = window.FC.lang;
const ar = lang === "ar";
const main = document.getElementById("main");

const html = `
<section class="container">
  <div class="about-hero">
    <div data-anim="up">
      <span class="eyebrow">${t("about.eyebrow")}</span>
      <h1 style="margin-top:14px">${t("about.title")}</h1>
      <p class="lead" style="margin-top:20px">${t("about.sub")}</p>
      <div style="display:flex; gap:12px; margin-top:32px; flex-wrap:wrap">
        <a href="contact.html" class="btn btn-accent">${t("hero.ctaPrimary")} <span class="arrow">→</span></a>
        <a href="services.html" class="btn btn-ghost">${t("hero.ctaSecondary")}</a>
      </div>
    </div>
    <div class="visual" data-anim="up">
      <img src="${window.FC.imgUrl("slider/who_we_are.jpg")}" alt="" onerror="this.style.display='none'; this.parentElement.classList.add('ph');">
    </div>
  </div>
</section>

<section class="container section-tight">
  <div class="counters" data-stagger="120">
    ${t("counters.items").map(c => `
      <div>
        <div class="num"><span data-counter="${c.n}">0</span><span class="suffix">${c.suffix}</span></div>
        <div class="lab">${c.label}</div>
      </div>
    `).join("")}
  </div>
</section>

<section class="container section">
  <div style="text-align:center; max-width:680px; margin:0 auto 12px" data-anim="up">
    <span class="eyebrow" style="justify-content:center; display:inline-flex">${ar ? "ما نؤمن به" : "What we stand for"}</span>
    <h2 style="margin-top:14px">${ar ? "مهمة، رؤية، وقيم تقودنا" : "Mission, vision, and values that guide us"}</h2>
  </div>
  <div class="pillars" data-stagger="140">
    <div class="pillar">
      <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
      <h3>${t("about.missionT")}</h3>
      <p>${t("about.missionD")}</p>
    </div>
    <div class="pillar">
      <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></div>
      <h3>${t("about.visionT")}</h3>
      <p>${t("about.visionD")}</p>
    </div>
    <div class="pillar">
      <div class="ico"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div>
      <h3>${t("about.valuesT")}</h3>
      <p>${t("about.valuesD")}</p>
    </div>
  </div>
</section>

<section class="container section" style="background:var(--bg-soft); border-radius:var(--radius-lg); padding:72px 48px;">
  <div style="max-width:680px; margin-bottom:24px" data-anim="up">
    <span class="eyebrow">${t("about.timelineTitle")}</span>
    <h2 style="margin-top:14px">${ar ? "رحلة من ٢٠١٨ إلى اليوم" : "Our journey from 2018 to today"}</h2>
  </div>
  <div class="timeline">
    ${t("about.timeline").map(it => `
      <div class="tl-item" data-anim="left">
        <div class="tl-year">${it.y}</div>
        <div class="tl-content">
          <h3>${it.t}</h3>
          <p>${it.d}</p>
        </div>
      </div>
    `).join("")}
  </div>
</section>

<section class="container section-tight">
  <div class="cta-banner" data-anim="up">
    <div>
      <h2 style="margin-bottom:14px">${t("bookCta.title")}</h2>
      <p>${t("bookCta.sub")}</p>
      <div class="row" style="margin-top:24px">
        <a class="btn btn-accent" href="contact.html">${t("hero.ctaPrimary")} <span class="arrow">→</span></a>
        <a class="btn btn-ghost" href="tel:+201119383646">+20 111 938 3646</a>
      </div>
    </div>
    <div class="cta-illus">
      <div class="row"><div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="label">${ar ? "+٤٨٠٠ عميل" : "4,800+ clients"}</div><div class="sub">${ar ? "ثقة بُنيت على الجدية" : "Trust built on results"}</div></div></div>
      <div class="row"><div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="label">${ar ? "+٨ سنوات خبرة" : "8+ years experience"}</div><div class="sub">${ar ? "في السوق المصري" : "in the Egyptian market"}</div></div></div>
    </div>
  </div>
</section>
`;
main.innerHTML = html;
window.FC.mountChrome("about");
window.FC.observeReveal();
window.FC.boot();
</script>
</body>
</html>
